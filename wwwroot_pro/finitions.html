<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Étapes de finition — Gestion Atelier</title>
  <link rel="stylesheet" href="/pro/css/style.css" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; margin: 0; padding: 0; }
    #app { max-width: 520px; margin: 24px auto; background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.1); padding: 24px; }
    h1 { font-size: 20px; font-weight: 700; color: #111827; margin: 0 0 4px; }
    .subtitle { font-size: 13px; color: #6b7280; margin: 0 0 20px; }
    .step-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; border-radius: 8px; border: 1px solid #e5e7eb; background: white; margin-bottom: 8px; transition: background .15s, border-color .15s; }
    .step-row.done { background: #f0fdf4; border-color: #bbf7d0; }
    .step-row.locked { opacity: .6; }
    .step-row input[type=checkbox] { width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0; accent-color: #16a34a; cursor: pointer; }
    .step-row input[type=checkbox]:disabled { cursor: not-allowed; }
    .step-name { font-size: 14px; font-weight: 600; color: #111827; }
    .step-name.done-text { color: #16a34a; }
    .step-name.locked-text { color: #9ca3af; }
    .step-meta { font-size: 11px; color: #6b7280; margin-top: 2px; }
    .step-sub { font-size: 11px; color: #4b5563; margin-top: 2px; }
    #login-form { display: flex; flex-direction: column; gap: 12px; }
    #login-form input { padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; }
    #login-form input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.2); }
    .btn-primary { background: #6366f1; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-sm { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
    .btn-sm:hover { background: #e5e7eb; }
    #error-msg { color: #ef4444; font-size: 13px; }
    #loading { color: #6b7280; font-size: 14px; text-align: center; padding: 24px; }
    #access-denied { color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 12px 16px; font-size: 14px; }
    .progress-bar-wrap { background: #e5e7eb; border-radius: 999px; height: 6px; margin-bottom: 16px; }
    .progress-bar { height: 6px; border-radius: 999px; background: #16a34a; transition: width .3s; }
    .dossier-info { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 13px; color: #374151; }
  </style>
</head>
<body>
  <div id="app">
    <div id="login-section" style="display:none;">
      <h1>✂️ Finitions</h1>
      <p class="subtitle">Connectez-vous pour accéder aux étapes de finition.</p>
      <div id="login-form">
        <input type="text" id="login-input" placeholder="Login" autocomplete="username" />
        <input type="password" id="pwd-input" placeholder="Mot de passe" autocomplete="current-password" />
        <button class="btn-primary" id="login-btn">Se connecter</button>
        <div id="error-msg"></div>
      </div>
    </div>
    <div id="loading">Chargement…</div>
    <div id="main-section" style="display:none;"></div>
  </div>
  <script type="module" src="/pro/js/finitions.js"></script>
</body>
</html>
