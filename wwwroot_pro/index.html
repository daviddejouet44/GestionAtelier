<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Gestion d'Atelier</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/styles.css?v=10" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
  </script>
</head>

<body>

  <!-- LOGIN -->
  <div id="login-container" class="login-container">
    <div class="login-panel">
      <img src="/api/logo-login" alt="Logo" style="max-height:80px;max-width:200px;margin:0 auto 16px;display:block;" onerror="this.style.display='none'" />
      <h1>Gestion d'Atelier</h1>
      <form id="login-form">
        <div class="form-group">
          <label>Login</label>
          <input type="text" id="login-input" placeholder="Votre login" required />
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" id="password-input" placeholder="Votre mot de passe" required />
        </div>
        <div id="login-error" class="login-error" style="display: none;"></div>
        <button type="submit">Se connecter</button>
      </form>
    </div>
  </div>

  <!-- APP -->
  <div id="app-container" class="app-container hidden">

    <!-- HEADER -->
    <header>
      <div class="header-brand">
        <h1>Gestion d'Atelier</h1>
        <img id="app-logo" src="/api/logo" alt="Logo" style="max-height:40px;margin-left:12px;display:none;" onerror="this.style.display='none'" onload="this.style.display='inline-block'" />
      </div>
      <div class="header-right">
        <div id="notif-bell" class="notif-bell" style="display:none;">
          <button id="notif-btn" class="notif-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span id="notif-count" class="notif-count hidden">0</span>
          </button>
          <div id="notif-dropdown" class="notif-dropdown hidden"></div>
        </div>
        <span id="user-info">Utilisateur</span>
        <button id="btn-logout" class="btn">Déconnexion</button>
        <button id="btn-settings" class="btn" style="display:none;">Paramétrage</button>
      </div>
    </header>

    <!-- TOOLBAR (menu buttons) -->
    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="Rechercher…" />
      <select id="sortBy">
        <option value="date_desc">Date (récent → ancien)</option>
        <option value="date_asc">Date (ancien → récent)</option>
        <option value="name_asc">Nom (A→Z)</option>
        <option value="name_desc">Nom (Z→A)</option>
        <option value="size_desc">Taille (grosse → petite)</option>
        <option value="size_asc">Taille (petite → grosse)</option>
      </select>
      <div class="tab-buttons">
        <button id="btnViewSubmission" class="tab-btn" style="display:none;">Soumission</button>
        <button id="btnViewKanban" class="tab-btn active">Production</button>
        <button id="btnViewCalendar" class="tab-btn">Planning</button>
        <button id="btnViewBat" class="tab-btn" style="display:none;">BAT</button>
        <button id="btnViewRapport" class="tab-btn" style="display:none;">Rapport</button>
        <button id="btnViewDossiers" class="tab-btn" style="display:none;">Dossiers</button>
        <button id="btnViewGlobalProd" class="tab-btn" style="display:none;">Vue production</button>
        <button id="btnViewDashboard" class="tab-btn" style="display:none;">Dashboard</button>
        <button id="btnViewRecycle" class="tab-btn" style="display:none;">Corbeille</button>
      </div>
    </div>

    <!-- FILTRES KANBAN (visible uniquement en vue Production) -->
    <div id="kanban-filter-bar" class="kanban-filter-bar" style="display:none;"></div>

    <!-- ALERTE GLOBALE (urgences + alertes BAT) -->
    <div id="global-alert" class="global-alert" style="display:none;"></div>

    <!-- CONTAINER -->
    <div class="container">
      <div id="kanban-layout" class="kanban-layout hidden">
        <div id="kanban-summary" class="kanban-summary" style="display:none;"></div>
        <div id="kanban-area" class="kanban-area">
          <div id="kanban"></div>
          <aside id="kanban-sidebar" class="kanban-sidebar"></aside>
        </div>
      </div>
      <div id="calendar" class="hidden"></div>
      <div id="submission" class="submission hidden"></div>
      <div id="production" class="production-view hidden"></div>
      <div id="dossiers" class="hidden"></div>
      <div id="bat-view" class="hidden"></div>
      <div id="rapport-view" class="hidden"></div>
      <div id="recycle" class="hidden"></div>
      <div id="dashboard" class="hidden"></div>
      <div id="global-production" class="hidden"></div>
      <div id="settings-view" class="hidden"></div>
    </div>

    <!-- MODALE FICHE FABRICATION -->
    <div id="fab-modal" class="modal hidden">
      <div class="fab-modal-content">
        <h2>Fiche de fabrication</h2>
        <div id="fab-stage-banner" style="display:none;margin-bottom:12px;padding:8px 14px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;font-size:13px;color:#0369a1;font-weight:500;"></div>
        <!-- Dynamic form injected here by fabrication.js -->
        <div id="fab-dynamic-form" class="fab-form-grid"></div>
        <!-- History always shown below the dynamic form -->
        <div class="fab-form-group fab-full-width" style="margin-top:8px;">
          <label>Historique</label>
          <div id="fab-history" style="max-height:120px;overflow-y:auto;font-size:12px;color:#6b7280;"></div>
        </div>
        <div class="fab-modal-buttons">
          <button id="fab-close">Fermer</button>
          <button id="fab-pdf" class="btn btn-primary">Générer PDF</button>
          <button id="fab-prisma" class="btn btn-primary" style="display:none;">→ PrismaPrepare</button>
          <button id="fab-finprod" class="btn btn-primary">Fin de production</button>
          <button id="fab-delivery-remove" class="btn">Retirer du planning</button>
          <button id="fab-send-bat-client" class="btn" title="Envoyer le BAT au client (espace portail)" style="display:none;">📤 Envoyer BAT client</button>
          <button id="fab-export" class="btn" title="Exporter la fiche (XML / CSV)">📤 Exporter</button>
          <button id="fab-save" class="btn btn-primary">Enregistrer</button>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="js/app.js?v=30"></script>

</body>
</html>
