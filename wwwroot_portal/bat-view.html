<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Validation BAT</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f3f4f6; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: white; border-radius: 12px; padding: 32px; max-width: 420px; width: 90%; text-align: center; box-shadow: 0 4px 12px rgba(0,0,0,.1); }
    h2 { font-size: 18px; margin-bottom: 12px; }
    p  { font-size: 14px; color: #6b7280; }
    a  { color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="box">
    <h2>⏳ Redirection en cours…</h2>
    <p>Vous allez être redirigé vers votre commande.</p>
    <p id="msg"></p>
  </div>
  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token') || '';

      if (!token) {
        document.getElementById('msg').textContent = '❌ Lien invalide.';
        return;
      }

      try {
        // Fetch the order ID associated with this token so we can redirect to order.html
        const res = await fetch('/api/portal/bat/view?token=' + encodeURIComponent(token));
        const data = await res.json();

        if (data.ok && data.bat && data.bat.orderId) {
          window.location.replace('/portal/order.html?id=' + encodeURIComponent(data.bat.orderId) + '&batToken=' + encodeURIComponent(token));
        } else {
          document.getElementById('msg').textContent = '❌ ' + (data.error || 'Lien invalide ou expiré.');
        }
      } catch {
        document.getElementById('msg').textContent = '❌ Erreur de chargement. Veuillez réessayer.';
      }
    })();
  </script>
</body>
</html>
